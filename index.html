<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuPack Pro - Smart Indoor Editor</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary: #e63946;
            --dark-bg: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2a2a2a;
            --gold: #ffb703;
            --accent: #457b9d;
            --highlight: rgba(255, 183, 3, 0.25);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        
        #editor-region {
            flex: 1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            /* Preto puro para exibição */
            transition: padding 0.3s;
            position: relative;
        }
        
        #canvas {
            position: relative;
            background: #111 no-repeat center center;
            background-size: cover;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            width: 1280px;
            height: 720px;
            transform-origin: center;
        }
        
        body.portrait-mode #canvas {
            width: 720px;
            height: 1280px;
        }
        
        #bg-filter {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }
        
        .draggable {
            position: absolute;
            z-index: 10;
            cursor: move;
            transition: outline 0.2s;
            transform-origin: top left;
        }
        /* Outline apenas quando o painel admin está visível */
        
        body:not(.hide-admin) .draggable:hover {
            outline: 2px dashed var(--gold);
        }
        
        #logo-preview {
            width: 150px;
            min-height: 50px;
        }
        
        #text-header {
            color: white;
            min-width: 300px;
        }
        
        #text-header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 900;
        }
        
        #text-header p {
            margin: 0;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        #preview-principal {
            width: 400px;
            height: 400px;
            object-fit: contain;
            transition: opacity 0.5s;
        }
        
        #lista-container {
            width: 450px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #selector-highlight {
            position: absolute;
            left: 0;
            width: 100%;
            height: 72px;
            background: var(--highlight);
            border-left: 6px solid var(--gold);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            pointer-events: none;
        }
        
        .menu-item {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 15px;
            color: #fff;
            height: 36px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 6;
        }
        
        .item-nome {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        
        .item-preco {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: bold;
        }
        
        #admin-panel {
            width: 400px;
            height: 100%;
            background: var(--sidebar-bg);
            color: #ecf0f1;
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }
        
        .user-session-info {
            background: #111;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        
        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .session-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .session-value {
            font-size: 11px;
            color: #eee;
            font-weight: 600;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #e63946;
            border-radius: 50%;
        }
        
        .status-dot.online {
            background: #27ae60;
            box-shadow: 0 0 5px #27ae60;
        }
        
        .panel-header {
            background: var(--dark-bg);
            padding: 20px;
            border-bottom: 2px solid var(--primary);
        }
        
        .tab-menu {
            display: flex;
            background: #111;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .tab-btn.active {
            border-bottom: 3px solid var(--primary);
            background: var(--sidebar-bg);
        }
        
        .panel-content {
            padding: 20px;
        }
        
        .input-group {
            background: var(--card-bg);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        
        .input-group label {
            display: block;
            font-size: 10px;
            color: #bdc3c7;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        
        .btn-main {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .btn-publish {
            background: var(--primary);
            color: white;
        }
        
        .btn-save {
            background: var(--accent);
            color: white;
        }
        
        .btn-add {
            background: #27ae60;
            color: white;
        }
        
        .slide-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .slide-thumb {
            padding: 8px 15px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
        }
        
        .slide-thumb.active {
            background: var(--primary);
        }
        /* BOTÃO DE CONFIGURAÇÃO DISCRETO NO CANTO DIREITO */
        
        .btn-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(42, 42, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .btn-toggle:hover {
            background: var(--primary);
            transform: rotate(90deg);
            opacity: 1;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="hide-admin">

    <button class="btn-toggle" onclick="toggleAdmin()">⚙️</button>

    <div id="editor-region">
        <div id="canvas">
            <div id="bg-filter"></div>
            <img id="logo-preview" src="" class="draggable" data-key="logo">
            <div id="text-header" class="draggable" data-key="header">
                <h1 id="view-title">CARDÁPIO DO DIA</h1>
                <p id="view-desc">Confira nossas ofertas especiais</p>
            </div>
            <img id="preview-principal" src="" class="draggable" data-key="img">
            <div id="lista-container" class="draggable" data-key="lista">
                <div id="selector-highlight"></div>
                <div id="items-render"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="user-session-info">
            <div class="session-row">
                <span class="session-label">Sessão Ativa</span>
                <button id="auth-btn" style="background:none; border:1px solid var(--primary); color:var(--primary); cursor:pointer; font-size:10px; padding:2px 8px;" onclick="toggleLogin()">Login</button>
            </div>
            <div class="session-row">
                <div style="display:flex; align-items:center; gap:5px">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="user-display" class="session-value">Desconectado</span>
                </div>
            </div>
            <div class="session-row" style="margin-top:10px; border-top: 1px solid #333; padding-top: 8px;">
                <span class="session-label">ID DA TV:</span>
                <span id="display-device-id" class="session-value" style="color:var(--gold); cursor:pointer" onclick="changeDevicePrompt()">---</span>
            </div>
        </div>

        <div class="panel-header">
            <h3 style="margin:0">MenuPack <span style="color:var(--primary)">PRO</span></h3>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('layout')">Layout</button>
            <button class="tab-btn" onclick="openTab('produtos')">Produtos</button>
            <button class="tab-btn" onclick="openTab('slides')">Slides</button>
        </div>

        <div class="panel-content">
            <div id="tab-layout" class="tab-pane">
                <div class="input-group">
                    <label>Orientação</label>
                    <select id="in-orientation" onchange="updateOrientation(this.value)">
                        <option value="landscape">Paisagem (Horizontal)</option>
                        <option value="portrait">Retrato (Vertical)</option>
                    </select>
                    <label>Fundo (URL)</label>
                    <input type="text" id="in-bg" onchange="updateBase('bg', this.value)">
                    <label>Logo (URL)</label>
                    <input type="text" id="in-logo" onchange="updateBase('logo', this.value)">
                </div>
                <div class="input-group">
                    <label>Textos Fixos</label>
                    <input type="text" id="in-title" placeholder="Título" oninput="updateBase('title', this.value)">
                    <input type="text" id="in-desc" placeholder="Descrição" oninput="updateBase('desc', this.value)">
                </div>
                <div class="input-group">
                    <label>Escalas</label>
                    <small>Logo</small> <input type="range" min="0.5" max="3" step="0.1" oninput="updateScale('logo', this.value)">
                    <small>Textos</small> <input type="range" min="0.5" max="3" step="0.1" oninput="updateScale('header', this.value)">
                    <small>Lista</small> <input type="range" min="0.5" max="3" step="0.1" oninput="updateScale('lista', this.value)">
                </div>
            </div>

            <div id="tab-produtos" class="tab-pane hidden">
                <div id="admin-items-list"></div>
                <button class="btn-main btn-add" onclick="addItem()">+ Adicionar Produto</button>
            </div>

            <div id="tab-slides" class="tab-pane hidden">
                <div class="slide-selector" id="slide-nav"></div>
                <button class="btn-main btn-add" onclick="duplicateSlide()">Duplicar Slide</button>
                <button class="btn-main" style="background:#c0392b; color:white" onclick="deleteSlide()">Excluir Slide</button>
            </div>

            <hr style="border:0; border-top: 1px dashed #444; margin: 20px 0;">
            <button class="btn-main btn-save" onclick="salvarRascunho()">Sincronizar Nuvem</button>
            <button class="btn-main btn-publish" onclick="publicarNaPlaylist()">Publicar na TV Agora</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            storageBucket: "newsmartonapp.firebasestorage.app",
            messagingSenderId: "1096968028299",
            appId: "1:1096968028299:web:f3a9e48db108afbbb7548e",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let appState = {
            deviceId: "SVbuSWCNoO42VqDPEmYg",
            ownerUid: null,
            currentUser: null,
            currentSlide: 0,
            activeItemIdx: 0,
            slides: [{
                nome: "Menu Principal",
                duracao: 15,
                orientation: "landscape",
                logo: "https://cdn-icons-png.flaticon.com/512/732/732217.png",
                title: "MENU ESPECIAL",
                desc: "Confira nossas ofertas",
                bg: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1920",
                scales: {
                    logo: 1,
                    header: 1,
                    img: 1,
                    lista: 1
                },
                pos: {
                    lista: {
                        x: 750,
                        y: 150
                    },
                    img: {
                        x: 100,
                        y: 150
                    },
                    logo: {
                        x: 50,
                        y: 30
                    },
                    header: {
                        x: 250,
                        y: 40
                    }
                },
                lista: [{
                    nome: "Item Exemplo",
                    preco: "35,00",
                    img: ""
                }]
            }]
        };

        async function init() {
            document.getElementById('display-device-id').innerText = appState.deviceId;

            if (appState.ownerUid) {
                db.doc(`usuarios/${appState.ownerUid}/dispositivos/${appState.deviceId}/MenuPack/data`)
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.slides) {
                                appState.slides = data.slides;
                                loadSlide(appState.currentSlide);
                            }
                        }
                    });
            }

            loadSlide(0);
            startRotation();
            applyScaling();
            window.addEventListener('resize', applyScaling);
        }

        function loadSlide(idx) {
            appState.currentSlide = idx;
            const s = appState.slides[idx];
            if (!s) return;

            document.getElementById('in-bg').value = s.bg;
            document.getElementById('in-logo').value = s.logo;
            document.getElementById('in-title').value = s.title;
            document.getElementById('in-desc').value = s.desc;
            document.getElementById('in-orientation').value = s.orientation;

            updateOrientation(s.orientation);
            render();
            renderAdmin();
            renderSlideNav();
            applyPositionsAndScales();
        }

        function render() {
            const s = appState.slides[appState.currentSlide];
            document.getElementById('canvas').style.backgroundImage = `url('${s.bg}')`;
            document.getElementById('logo-preview').src = s.logo;
            document.getElementById('view-title').innerText = s.title;
            document.getElementById('view-desc').innerText = s.desc;

            const list = document.getElementById('items-render');
            list.innerHTML = s.lista.map(item => `
                <div class="menu-item">
                    <span class="item-nome">${item.nome}</span>
                    <span class="item-preco">R$ ${item.preco}</span>
                </div>
            `).join('');
            updateHighlight();
        }

        function applyPositionsAndScales() {
            const s = appState.slides[appState.currentSlide];
            document.querySelectorAll('.draggable').forEach(el => {
                const key = el.getAttribute('data-key');
                const p = s.pos[key];
                const scale = s.scales[key] || 1;
                el.style.transform = `translate(${p.x}px, ${p.y}px) scale(${scale})`;
                el.setAttribute('data-x', p.x);
                el.setAttribute('data-y', p.y);
            });
        }

        interact('.draggable').draggable({
            listeners: {
                move(event) {
                    const t = event.target;
                    const key = t.getAttribute('data-key');
                    const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;

                    appState.slides[appState.currentSlide].pos[key] = {
                        x,
                        y
                    };
                    const scale = appState.slides[appState.currentSlide].scales[key] || 1;

                    t.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
                    t.setAttribute('data-x', x);
                    t.setAttribute('data-y', y);
                }
            }
        });

        function updateBase(f, v) {
            appState.slides[appState.currentSlide][f] = v;
            render();
        }

        function updateScale(key, val) {
            appState.slides[appState.currentSlide].scales[key] = val;
            applyPositionsAndScales();
        }

        function updateOrientation(mode) {
            appState.slides[appState.currentSlide].orientation = mode;
            document.body.classList.toggle('portrait-mode', mode === 'portrait');
            setTimeout(applyScaling, 100);
        }

        function applyScaling() {
            const region = document.getElementById('editor-region');
            const canvas = document.getElementById('canvas');
            const isAdminVisible = !document.getElementById('admin-panel').classList.contains('hidden');

            // Ajusta o cálculo baseado na largura disponível
            const availableWidth = isAdminVisible ? region.offsetWidth : window.innerWidth;
            const availableHeight = window.innerHeight;

            const scale = Math.min((availableWidth - 40) / canvas.offsetWidth, (availableHeight - 40) / canvas.offsetHeight);
            canvas.style.transform = `scale(${scale})`;
        }

        async function salvarRascunho() {
            if (!appState.currentUser) return alert("Faça login primeiro!");
            const path = `usuarios/${appState.ownerUid}/dispositivos/${appState.deviceId}/MenuPack/data`;
            try {
                await db.doc(path).set({
                    slides: appState.slides,
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                }, {
                    merge: true
                });
                alert("✅ Rascunho sincronizado!");
                return true;
            } catch (e) {
                console.error(e);
                alert("Erro ao salvar.");
                return false;
            }
        }

        async function publicarNaPlaylist() {
            if (!appState.currentUser) return alert("Faça login primeiro!");
            const salvo = await salvarRascunho();
            if (!salvo) return;
            try {
                const totalDur = appState.slides.reduce((t, s) => t + (parseInt(s.duracao) || 10), 0);
                const novaMidia = {
                    nome: "Menu Digital - " + new Date().toLocaleTimeString(),
                    url: `https://marcelonstos-byte.github.io/menupack/?id=${appState.deviceId}&owner=${appState.ownerUid}`,
                    tipo: "Menu",
                    duracao: totalDur,
                    ativo: true,
                    timestamp: new Date().toISOString()
                };
                const ref = db.doc(`usuarios/${appState.ownerUid}/dispositivos/${appState.deviceId}`);
                await ref.update({
                    midias: firebase.firestore.FieldValue.arrayUnion(novaMidia),
                    lastActive: new Date().toISOString()
                });
                alert("🚀 Publicado na TV!");
            } catch (e) {
                alert("Erro ao publicar: " + e.message);
            }
        }

        function renderAdmin() {
            const s = appState.slides[appState.currentSlide];
            const div = document.getElementById('admin-items-list');
            div.innerHTML = s.lista.map((item, i) => `
                <div class="input-group">
                    <input type="text" value="${item.nome}" oninput="updateItem(${i}, 'nome', this.value)" placeholder="Nome">
                    <input type="text" value="${item.preco}" oninput="updateItem(${i}, 'preco', this.value)" placeholder="Preço">
                    <input type="text" value="${item.img}" onchange="updateItem(${i}, 'img', this.value)" placeholder="URL Imagem">
                    <button onclick="removeItem(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:10px">Remover</button>
                </div>
            `).join('');
        }

        function updateItem(i, f, v) {
            appState.slides[appState.currentSlide].lista[i][f] = v;
            render();
        }

        function addItem() {
            appState.slides[appState.currentSlide].lista.push({
                nome: "Novo Item",
                preco: "0,00",
                img: ""
            });
            renderAdmin();
            render();
        }

        function removeItem(i) {
            appState.slides[appState.currentSlide].lista.splice(i, 1);
            renderAdmin();
            render();
        }

        function duplicateSlide() {
            const clone = JSON.parse(JSON.stringify(appState.slides[appState.currentSlide]));
            appState.slides.push(clone);
            loadSlide(appState.slides.length - 1);
        }

        function deleteSlide() {
            if (appState.slides.length > 1) {
                appState.slides.splice(appState.currentSlide, 1);
                loadSlide(0);
            }
        }

        function renderSlideNav() {
            const nav = document.getElementById('slide-nav');
            nav.innerHTML = appState.slides.map((_, i) => `
                <div class="slide-thumb ${i === appState.currentSlide ? 'active' : ''}" onclick="loadSlide(${i})">Slide ${i+1}</div>
            `).join('');
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            const isHidden = p.classList.toggle('hidden');
            document.body.classList.toggle('hide-admin', isHidden);
            setTimeout(applyScaling, 300);
        }

        function openTab(t) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function updateHighlight() {
            const s = appState.slides[appState.currentSlide];
            const h = document.getElementById('selector-highlight');
            const img = document.getElementById('preview-principal');
            if (!s.lista.length) return;
            h.style.transform = `translateY(${appState.activeItemIdx * 72}px)`;
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = s.lista[appState.activeItemIdx].img || 'https://via.placeholder.com/400?text=MenuPack';
                img.style.opacity = '1';
            }, 300);
        }

        function startRotation() {
            setInterval(() => {
                const s = appState.slides[appState.currentSlide];
                if (s.lista.length > 0) {
                    appState.activeItemIdx = (appState.activeItemIdx + 1) % s.lista.length;
                    updateHighlight();
                }
            }, 5000);
        }

        function changeDevicePrompt() {
            const id = prompt("ID da TV:", appState.deviceId);
            if (id) {
                appState.deviceId = id;
                document.getElementById('display-device-id').innerText = id;
                init();
            }
        }

        function toggleLogin() {
            if (appState.currentUser) auth.signOut();
            else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        auth.onAuthStateChanged(user => {
            appState.currentUser = user;
            appState.ownerUid = user ? user.uid : null;
            document.getElementById('status-dot').classList.toggle('online', !!user);
            document.getElementById('user-display').innerText = user ? user.email : "Desconectado";
            document.getElementById('auth-btn').innerText = user ? "Sair" : "Login";
            if (user) init();
        });

        window.onload = init;
    </script>
</body>

</html>
