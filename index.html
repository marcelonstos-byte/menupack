<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuPack Pro - Smart Indoor Editor</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary: #e63946;
            --dark-bg: #121212;
            --sidebar-bg: #1e1e1e;
            --card-bg: #2a2a2a;
            --gold: #ffb703;
            --accent: #457b9d;
            --highlight: rgba(255, 183, 3, 0.25);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        
        #editor-region {
            flex: 1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #090909;
            padding-right: 400px;
            transition: padding 0.3s;
        }
        
        #canvas {
            position: relative;
            background: #111 no-repeat center center;
            background-size: cover;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            width: 1280px;
            height: 720px;
            transform-origin: center;
        }
        
        body.portrait-mode #canvas {
            width: 720px;
            height: 1280px;
        }
        
        #bg-filter {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }
        
        .draggable {
            position: absolute;
            z-index: 10;
            cursor: move;
            transition: outline 0.2s;
            transform-origin: top left;
        }
        
        .draggable:hover {
            outline: 2px dashed var(--gold);
        }
        
        #logo-preview {
            width: 150px;
            min-height: 50px;
        }
        
        #text-header {
            color: white;
        }
        
        #text-header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 900;
        }
        
        #text-header p {
            margin: 0;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        #preview-principal {
            width: 400px;
            height: 400px;
            object-fit: contain;
            transition: opacity 0.5s;
        }
        
        #lista-container {
            width: 450px;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #selector-highlight {
            position: absolute;
            left: 0;
            width: 100%;
            height: 72px;
            background: var(--highlight);
            border-left: 6px solid var(--gold);
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 5;
            pointer-events: none;
        }
        
        .menu-item {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 15px;
            color: #fff;
            height: 36px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 6;
        }
        
        .item-nome {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        
        .item-preco {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: bold;
        }
        
        #admin-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            height: 100%;
            background: var(--sidebar-bg);
            color: #ecf0f1;
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            display: block;
        }
        /* Estilo atraente para Login/ID */
        
        .user-session-info {
            background: #111;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        
        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .session-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .session-value {
            font-size: 11px;
            color: #eee;
            font-weight: 600;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #222;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #e63946;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(230, 57, 70, 0.5);
        }
        
        .status-dot.online {
            background: #27ae60;
            box-shadow: 0 0 5px rgba(39, 174, 96, 0.5);
        }
        
        .panel-header {
            background: var(--dark-bg);
            padding: 20px;
            border-bottom: 2px solid var(--primary);
        }
        
        .tab-menu {
            display: flex;
            background: #111;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .tab-btn.active {
            border-bottom: 3px solid var(--primary);
            background: var(--sidebar-bg);
        }
        
        .panel-content {
            padding: 20px;
        }
        
        .input-group {
            background: var(--card-bg);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        
        .input-group label {
            display: block;
            font-size: 11px;
            color: #bdc3c7;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="range"],
        select {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        
        .scale-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-main {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-size: 12px;
        }
        
        .btn-publish {
            background: var(--primary);
            color: white;
        }
        
        .btn-save {
            background: var(--accent);
            color: white;
        }
        
        .btn-add {
            background: #27ae60;
            color: white;
        }
        
        .btn-auth {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
        }
        
        .slide-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .slide-thumb {
            padding: 8px 15px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
        }
        
        .slide-thumb.active {
            background: var(--primary);
        }
        
        .btn-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2000;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <button class="btn-toggle" onclick="toggleAdmin()">⚙️</button>

    <div id="editor-region">
        <div id="canvas">
            <div id="bg-filter"></div>
            <img id="logo-preview" src="" class="draggable" data-x="50" data-y="30">

            <div id="text-header" class="draggable" data-x="250" data-y="40">
                <h1 id="view-title">CARDÁPIO DO DIA</h1>
                <p id="view-desc">Confira nossas ofertas especiais</p>
            </div>

            <img id="preview-principal" src="" class="draggable" data-x="100" data-y="150">

            <div id="lista-container" class="draggable" data-x="750" data-y="150">
                <div id="selector-highlight"></div>
                <div id="items-render"></div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="user-session-info">
            <div class="session-row">
                <span class="session-label">Sessão Ativa</span>
                <button id="auth-btn" class="btn-auth" onclick="toggleLogin()">Login</button>
            </div>
            <div class="session-row">
                <div class="status-badge">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="user-display" class="session-value">Desconectado</span>
                </div>
            </div>
            <div class="session-row" style="margin-top:12px; border-top: 1px solid #222; padding-top: 8px;">
                <span class="session-label">ID do Dispositivo:</span>
                <span id="display-device-id" class="session-value" style="color:var(--gold)">---</span>
            </div>
        </div>

        <div class="panel-header">
            <h3 style="margin:0">MenuPack <span style="color:var(--primary)">PRO</span></h3>
            <small style="display:block; opacity:0.7">Editor Visual e Sincronização</small>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('layout')">Layout</button>
            <button class="tab-btn" onclick="openTab('produtos')">Produtos</button>
            <button class="tab-btn" onclick="openTab('slides')">Slides</button>
        </div>

        <div class="panel-content">
            <div id="tab-layout" class="tab-pane">
                <div class="input-group">
                    <label>ID DA TV (Device ID)</label>
                    <input type="text" id="in-device" placeholder="Cole o ID aqui" onchange="updateDevice(this.value)">

                    <label>Orientação</label>
                    <select id="in-orientation" onchange="updateOrientation(this.value)">
                        <option value="landscape">Paisagem (Horizontal)</option>
                        <option value="portrait">Retrato (Vertical)</option>
                    </select>

                    <label>Fundo (URL)</label>
                    <input type="text" id="in-bg" placeholder="URL da Imagem de Fundo" onchange="updateBase('bg', this.value)">

                    <label>Logo (URL)</label>
                    <input type="text" id="in-logo" placeholder="URL da Logo" onchange="updateBase('logo', this.value)">
                </div>

                <div class="input-group">
                    <label>Ajuste de Tamanhos (Escala)</label>

                    <small>Logo</small>
                    <div class="scale-control">
                        <input type="range" min="0.1" max="3" step="0.1" value="1" oninput="updateScale('logo', this.value)">
                    </div>

                    <small>Cabeçalho (Textos)</small>
                    <div class="scale-control">
                        <input type="range" min="0.1" max="3" step="0.1" value="1" oninput="updateScale('header', this.value)">
                    </div>

                    <small>Imagem Principal</small>
                    <div class="scale-control">
                        <input type="range" min="0.1" max="3" step="0.1" value="1" oninput="updateScale('img', this.value)">
                    </div>

                    <small>Lista de Preços</small>
                    <div class="scale-control">
                        <input type="range" min="0.1" max="3" step="0.1" value="1" oninput="updateScale('lista', this.value)">
                    </div>
                </div>

                <div class="input-group">
                    <label>Textos Fixos</label>
                    <input type="text" id="in-title" placeholder="Título" oninput="updateBase('title', this.value)">
                    <input type="text" id="in-desc" placeholder="Descrição" oninput="updateBase('desc', this.value)">
                </div>
            </div>

            <div id="tab-produtos" class="tab-pane hidden">
                <div id="admin-items-list"></div>
                <button class="btn-main btn-add" onclick="addItem()">+ Adicionar Produto</button>
            </div>

            <div id="tab-slides" class="tab-pane hidden">
                <div class="slide-selector" id="slide-nav"></div>
                <button class="btn-main btn-add" onclick="duplicateSlide()">Duplicar Slide</button>
                <button class="btn-main" style="background:#c0392b; color:white" onclick="deleteSlide()">Excluir Slide</button>
            </div>

            <hr style="border:0; border-top: 1px dashed #444; margin: 20px 0;">
            <button class="btn-main btn-save" onclick="salvarRascunho()">Sincronizar Nuvem</button>
            <button class="btn-main btn-publish" onclick="publicarNaPlaylist()">Publicar na TV agora</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiTbWSlcKpsPEtEzPkSU0jHZkfcAg5fNU",
            authDomain: "newsmartonapp.firebaseapp.com",
            projectId: "newsmartonapp",
            storageBucket: "newsmartonapp.firebasestorage.app",
            messagingSenderId: "1096968028299",
            appId: "1:1096968028299:web:f3a9e48db108afbbb7548e",
            databaseURL: "https://newsmartonapp-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let appState = {
            deviceId: "SVbuSWCNoO42VqDPEmYg",
            currentUser: null,
            currentSlide: 0,
            activeItemIdx: 0,
            slides: [{
                orientation: "landscape",
                logo: "https://cdn-icons-png.flaticon.com/512/732/732217.png",
                title: "MENU ESPECIAL",
                desc: "Confira nossas ofertas",
                bg: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1920",
                scales: {
                    logo: 1,
                    header: 1,
                    img: 1,
                    lista: 1
                },
                pos: {
                    lista: {
                        x: 750,
                        y: 150
                    },
                    img: {
                        x: 100,
                        y: 150
                    },
                    logo: {
                        x: 50,
                        y: 30
                    },
                    header: {
                        x: 250,
                        y: 40
                    }
                },
                lista: [{
                    nome: "Item Exemplo",
                    preco: "35,00",
                    img: ""
                }]
            }]
        };

        function toggleLogin() {
            if (appState.currentUser) {
                auth.signOut();
            } else {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
            }
        }

        auth.onAuthStateChanged(user => {
            const dot = document.getElementById('status-dot');
            const display = document.getElementById('user-display');
            const btn = document.getElementById('auth-btn');
            if (user) {
                appState.currentUser = user;
                dot.classList.add('online');
                display.innerText = user.email;
                btn.innerText = "Sair";
            } else {
                appState.currentUser = null;
                dot.classList.remove('online');
                display.innerText = "Desconectado";
                btn.innerText = "Login";
            }
        });

        function init() {
            document.getElementById('in-device').value = appState.deviceId;
            document.getElementById('display-device-id').innerText = appState.deviceId;
            loadSlide(0);
            startRotation();
            applyScaling();
            window.addEventListener('resize', applyScaling);
        }

        function loadSlide(idx) {
            appState.currentSlide = idx;
            const data = appState.slides[idx];
            document.getElementById('in-bg').value = data.bg;
            document.getElementById('in-logo').value = data.logo;
            document.getElementById('in-title').value = data.title;
            document.getElementById('in-desc').value = data.desc;
            document.getElementById('in-orientation').value = data.orientation;
            updateOrientation(data.orientation);
            render();
            renderAdmin();
            applyPositionsAndScales();
            renderSlideNav();
        }

        function render() {
            const s = appState.slides[appState.currentSlide];
            document.getElementById('canvas').style.backgroundImage = `url('${s.bg}')`;
            document.getElementById('logo-preview').src = s.logo;
            document.getElementById('view-title').innerText = s.title;
            document.getElementById('view-desc').innerText = s.desc;

            const list = document.getElementById('items-render');
            list.innerHTML = s.lista.map(item => `
                <div class="menu-item">
                    <span class="item-nome">${item.nome}</span>
                    <span class="item-preco">R$ ${item.preco}</span>
                </div>
            `).join('');
            updateHighlight();
        }

        function updateScale(key, val) {
            appState.slides[appState.currentSlide].scales[key] = val;
            applyPositionsAndScales();
        }

        function updateDevice(id) {
            appState.deviceId = id;
            document.getElementById('display-device-id').innerText = id;
        }

        function applyPositionsAndScales() {
            const s = appState.slides[appState.currentSlide];
            const mapping = {
                'lista-container': 'lista',
                'preview-principal': 'img',
                'logo-preview': 'logo',
                'text-header': 'header'
            };

            Object.entries(mapping).forEach(([id, key]) => {
                const el = document.getElementById(id);
                const p = s.pos[key];
                const scale = s.scales[key] || 1;
                el.style.transform = `translate(${p.x}px, ${p.y}px) scale(${scale})`;
                el.setAttribute('data-x', p.x);
                el.setAttribute('data-y', p.y);
            });
        }

        interact('.draggable').draggable({
            listeners: {
                move(event) {
                    const t = event.target;
                    const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                    const idMap = {
                        'lista-container': 'lista',
                        'preview-principal': 'img',
                        'logo-preview': 'logo',
                        'text-header': 'header'
                    };
                    const key = idMap[t.id];
                    appState.slides[appState.currentSlide].pos[key] = {
                        x,
                        y
                    };
                    const scale = appState.slides[appState.currentSlide].scales[key] || 1;
                    t.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
                    t.setAttribute('data-x', x);
                    t.setAttribute('data-y', y);
                }
            }
        });

        function updateBase(f, v) {
            appState.slides[appState.currentSlide][f] = v;
            render();
        }

        function updateOrientation(mode) {
            appState.slides[appState.currentSlide].orientation = mode;
            document.body.classList.toggle('portrait-mode', mode === 'portrait');
            setTimeout(applyScaling, 50);
        }

        function applyScaling() {
            const region = document.getElementById('editor-region');
            const canvas = document.getElementById('canvas');
            const scale = Math.min((region.offsetWidth - 60) / canvas.offsetWidth, (region.offsetHeight - 60) / canvas.offsetHeight);
            canvas.style.transform = `scale(${scale})`;
        }

        function updateHighlight() {
            const s = appState.slides[appState.currentSlide];
            const h = document.getElementById('selector-highlight');
            const img = document.getElementById('preview-principal');
            if (!s.lista || s.lista.length === 0) return;
            h.style.transform = `translateY(${appState.activeItemIdx * 72.5}px)`;
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = s.lista[appState.activeItemIdx].img || 'https://via.placeholder.com/400?text=Sem+Imagem';
                img.style.opacity = '1';
            }, 300);
        }

        function startRotation() {
            setInterval(() => {
                const s = appState.slides[appState.currentSlide];
                if (s.lista && s.lista.length > 0) {
                    appState.activeItemIdx = (appState.activeItemIdx + 1) % s.lista.length;
                    updateHighlight();
                }
            }, 5000);
        }

        function renderAdmin() {
            const s = appState.slides[appState.currentSlide];
            const div = document.getElementById('admin-items-list');
            div.innerHTML = s.lista.map((item, i) => `
                <div class="input-group">
                    <input type="text" value="${item.nome}" oninput="updateItem(${i}, 'nome', this.value)" placeholder="Nome">
                    <input type="text" value="${item.preco}" oninput="updateItem(${i}, 'preco', this.value)" placeholder="Preço">
                    <input type="text" value="${item.img}" onchange="updateItem(${i}, 'img', this.value)" placeholder="URL Imagem">
                    <button onclick="removeItem(${i})" style="color:red; background:none; border:none; cursor:pointer">Remover</button>
                </div>
            `).join('');
        }

        function updateItem(i, f, v) {
            appState.slides[appState.currentSlide].lista[i][f] = v;
            render();
        }

        function addItem() {
            appState.slides[appState.currentSlide].lista.push({
                nome: "Novo Item",
                preco: "0,00",
                img: ""
            });
            renderAdmin();
            render();
        }

        function removeItem(i) {
            appState.slides[appState.currentSlide].lista.splice(i, 1);
            renderAdmin();
            render();
        }

        function duplicateSlide() {
            const current = JSON.parse(JSON.stringify(appState.slides[appState.currentSlide]));
            appState.slides.push(current);
            loadSlide(appState.slides.length - 1);
        }

        function deleteSlide() {
            if (appState.slides.length <= 1) return;
            appState.slides.splice(appState.currentSlide, 1);
            loadSlide(0);
        }

        function renderSlideNav() {
            const nav = document.getElementById('slide-nav');
            nav.innerHTML = appState.slides.map((_, i) => `
                <div class="slide-thumb ${i === appState.currentSlide ? 'active' : ''}" onclick="loadSlide(${i})">Slide ${i + 1}</div>
            `).join('');
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            const reg = document.getElementById('editor-region');
            const isHidden = p.style.display === 'none';
            p.style.display = isHidden ? 'block' : 'none';
            reg.style.paddingRight = isHidden ? '400px' : '0';
            setTimeout(applyScaling, 300);
        }

        function openTab(t) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        async function salvarRascunho() {
            if (!appState.currentUser) {
                alert("⚠️ Faça login para salvar!");
                return;
            }
            try {
                await db.collection('usuarios').doc(appState.currentUser.uid)
                    .collection('dispositivos').doc(appState.deviceId)
                    .collection('MenuPack').doc('datapack').set({
                        slides: appState.slides,
                        lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                    });
                alert("✅ Sincronizado!");
            } catch (e) {
                alert("❌ Erro de permissão.");
            }
        }

        async function publicarNaPlaylist() {
            await salvarRascunho();
        }

        window.onload = init;
    </script>
